name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.6'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Migrate (smoke)
        run: bun run db:migrate

      - name: Test with coverage
        run: bun run coverage

      - name: Assert parity matrix coverage
        run: |
          bun run --bun tests/parity-matrix-check.ts

  # Build + push the app image to GHCR (spec 030, FR-137), after the hermetic test gate. Uses the
  # built-in GITHUB_TOKEN (packages: write) — no PAT. Tags:
  #   push to main      → :edge, :acceptance, :sha-<short>   (the acceptance overlay tracks :acceptance)
  #   tag vX.Y.Z        → :X.Y.Z, :X.Y, :stable, :latest      (the prod overlay pins :stable → a digest)
  image:
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Container metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/danni-app
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=acceptance,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (linux/amd64 — matches the cx43/cx33 nodes)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # NOTE: production rollout (terraform + kubectl apply -k) lives in the private danni-bg/deploy repo —
  # the commercial deployment layer. This open-core repo only builds + publishes the app image above.
