name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.6'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Migrate (smoke)
        run: bun run db:migrate

      - name: Test with coverage
        run: bun run coverage

      - name: Assert parity matrix coverage
        run: |
          bun run --bun tests/parity-matrix-check.ts

  # Gated production deploy (spec 030, FR-137). Opt-in via the repo variable DEPLOY_ENABLED=true so
  # unconfigured repos/forks don't fail; runs only on a push to main, after the hermetic test gate.
  # The secret gate (FR-136 / SC-D3) fails the release if a placeholder or missing secret would ship.
  deploy:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.6'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Secret gate (no placeholder/missing secret reaches production)
        env:
          DANNI_PROFILE: production
          KRATOS_SECRETS_COOKIE: ${{ secrets.KRATOS_SECRETS_COOKIE }}
          KRATOS_SECRETS_CIPHER: ${{ secrets.KRATOS_SECRETS_CIPHER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          EXPLORER_DEFAULT_API_KEY: ${{ secrets.EXPLORER_DEFAULT_API_KEY }}
        run: bun run scripts/check-secrets.ts

      - name: Build app image
        run: docker build -t danni-app:${{ github.sha }} .

      # Registry push + release to the chosen host (Fly/Render/k8s/VM — deployment-specific). The image
      # is built above; wire login + push + the migrate-on-release rollout for your target here.
      - name: Push image + release
        run: |
          echo "Tag + push danni-app:${{ github.sha }} to your registry, then roll out."
          echo "Migrations run on container start (docker-entrypoint.sh) — a bad migration aborts boot."
