name: Bug report
description: Something in the danni app isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security vulnerabilities**, do not file here — see SECURITY.md.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. see error
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: danni version/commit, Bun version, OS, and how you're running it (dev / docker).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant output (redact any secrets).
      render: shell
    validations:
      required: false
