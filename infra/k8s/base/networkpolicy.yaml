# Private networking (spec 031, FR-143/147): default-deny ingress in the namespace, then open only the
# intended paths. Postgres is reachable solely from Kratos + the backup job; Kratos only from the app;
# the app only from the ingress controller. Egress stays open (LLM provider, ACME, object storage) but
# DNS is explicitly allowed so a future default-deny-egress tightening keeps name resolution working.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: danni
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: danni
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Keep all other egress open (LLM provider, ACME, backups). Tighten per environment as needed.
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-ingress
  namespace: danni
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: danni-app
  policyTypes: ["Ingress"]
  ingress:
    # From the ingress controller (label-select its namespace) — restrict further per cluster if wanted.
    - ports:
        - protocol: TCP
          port: 8790
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kratos-from-app
  namespace: danni
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: danni-kratos
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: danni-app
      ports:
        - protocol: TCP
          port: 4433
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-kratos
  namespace: danni
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: danni-kratos-postgres
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: danni-kratos
      ports:
        - protocol: TCP
          port: 5432
