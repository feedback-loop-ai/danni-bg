# Production Kratos config (spec 031). Mirrors the dev infra/ory/kratos.yaml flows, but: the public
# host is the real domain (substitute danni.example.org per environment — envsubst at render or an
# overlay configMapGenerator), secrets (cookie/cipher) + DSN come from env (the ExternalSecret), SMTP
# is real (override COURIER_SMTP_CONNECTION_URI via env), and courier templates fall back to Kratos
# defaults (the Bulgarian overrides are dev-only; bake them into the image to use them in prod).
# The danni app proxies /kratos on its own origin, so base_url keeps the /kratos/ prefix.
version: v26.2.0

dsn: memory # overridden by the DSN env from the ExternalSecret (danni-kratos-secrets)

serve:
  public:
    base_url: https://danni.example.org/kratos/
    cors:
      enabled: true
      allowed_origins:
        - https://danni.example.org
      allowed_methods: [POST, GET, PUT, PATCH, DELETE]
      allowed_headers: [Authorization, Cookie, Content-Type]
      exposed_headers: [Content-Type, Set-Cookie]
      allow_credentials: true
  admin:
    base_url: http://danni-kratos:4434/

selfservice:
  default_browser_return_url: https://danni.example.org/
  allowed_return_urls:
    - https://danni.example.org
    - https://danni.example.org/auth/callback
    - https://danni.example.org/admin/settings

  methods:
    password:
      enabled: true
      config:
        min_password_length: 10
        haveibeenpwned_enabled: true
        max_breaches: 0
        identifier_similarity_check_enabled: true
    link:
      enabled: true
      config:
        lifespan: 1h
    code:
      enabled: true
      config:
        lifespan: 1h
    passkey:
      enabled: true
      config:
        rp:
          display_name: danni.bg
          id: danni.example.org
          origins:
            - https://danni.example.org

  flows:
    error:
      ui_url: https://danni.example.org/auth/error
    settings:
      ui_url: https://danni.example.org/auth/settings
      privileged_session_max_age: 15m
    recovery:
      enabled: true
      ui_url: https://danni.example.org/auth/recovery
      use: link
      lifespan: 1h
      after:
        default_browser_return_url: https://danni.example.org/auth/login
    verification:
      enabled: true
      ui_url: https://danni.example.org/auth/verification
      use: link
      lifespan: 24h
      after:
        default_browser_return_url: https://danni.example.org/
    logout:
      after:
        default_browser_return_url: https://danni.example.org/auth/login
    login:
      ui_url: https://danni.example.org/auth/login
      lifespan: 10m
      after:
        default_browser_return_url: https://danni.example.org/auth/callback
    registration:
      enable_legacy_one_step: true
      ui_url: https://danni.example.org/auth/register
      lifespan: 10m
      after:
        default_browser_return_url: https://danni.example.org/auth/callback
        password:
          hooks:
            - hook: session
            - hook: show_verification_ui

log:
  level: info
  format: json
  leak_sensitive_values: false

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 12

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  # Real SMTP in production (FR-143). Override COURIER_SMTP_CONNECTION_URI via env from the secret store;
  # this default is a clearly-fake placeholder (the CI secret gate blocks shipping it).
  smtp:
    connection_uri: smtps://CHANGE_ME:CHANGE_ME@smtp.example.org:465/

session:
  lifespan: 24h
