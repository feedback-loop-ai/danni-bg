# Kratos Postgres (spec 031, FR-147): stateful backing service for identities. Private-network only
# (NetworkPolicy restricts ingress to Kratos + the backup job); a daily pg_dump CronJob wires to the
# spec-030 backup story. For multi-node app replicas, a second Postgres holds the app/control-plane
# tables (specs 029/030) — provisioned the same way (add an app-postgres overlay) — but single-node
# keeps app state in the per-node SQLite store and needs only this instance.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: danni-kratos-postgres
  namespace: danni
  labels:
    app.kubernetes.io/name: danni-kratos-postgres
    app.kubernetes.io/part-of: danni
spec:
  serviceName: danni-kratos-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: danni-kratos-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: danni-kratos-postgres
        app.kubernetes.io/part-of: danni
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: kratos
            - name: POSTGRES_DB
              value: kratos
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: danni-kratos-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kratos"]
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: danni-kratos-postgres
  namespace: danni
  labels:
    app.kubernetes.io/name: danni-kratos-postgres
spec:
  clusterIP: None # headless for the StatefulSet
  selector:
    app.kubernetes.io/name: danni-kratos-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
# Daily pg_dump to a backup PVC (FR-147 → spec 030 FR-139). Restore is rehearsed per docs/OPERATIONS.md.
# Point the replica at object storage (e.g. via an s3 sidecar) for off-cluster retention in production.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: danni-kratos-postgres-backup
  namespace: danni
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - 'pg_dump -h danni-kratos-postgres -U kratos kratos | gzip > /backup/kratos-$(date +%F).sql.gz'
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: danni-kratos-secrets
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: danni-kratos-backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: danni-kratos-backup
  namespace: danni
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
