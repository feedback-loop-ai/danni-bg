# Secrets from a secret manager (spec 031, FR-144): NEVER committed or baked. The External Secrets
# Operator (external-secrets.io) syncs from the backend into Kubernetes Secrets the workloads consume.
# This realizes spec 030 FR-136 at runtime; CI still blocks placeholder secrets. Swap the SecretStore
# provider for your backend (HashiCorp Vault here as a portable default; on a managed cloud use its
# secret manager). Rotation = update the backend; the operator re-syncs and pods pick it up on restart.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: danni-secret-store
  namespace: danni
spec:
  provider:
    vault:
      server: https://vault.example.org # patched per environment
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: danni
---
# App runtime secrets (LLM provider key, API-signing material, …).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: danni-app-secrets
  namespace: danni
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: danni-secret-store
    kind: SecretStore
  target:
    name: danni-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: EXPLORER_DEFAULT_API_KEY
      remoteRef:
        key: danni/app
        property: explorer_default_api_key
---
# Kratos secrets (cookie/cipher) + its Postgres DSN/password. The DSN is assembled from the password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: danni-kratos-secrets
  namespace: danni
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: danni-secret-store
    kind: SecretStore
  target:
    name: danni-kratos-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SECRETS_COOKIE: "{{ .cookie }}"
        SECRETS_CIPHER: "{{ .cipher }}"
        POSTGRES_PASSWORD: "{{ .pgPassword }}"
        DSN: "postgres://kratos:{{ .pgPassword }}@danni-kratos-postgres:5432/kratos?sslmode=disable"
  data:
    - secretKey: cookie
      remoteRef:
        key: danni/kratos
        property: cookie_secret
    - secretKey: cipher
      remoteRef:
        key: danni/kratos
        property: cipher_secret
    - secretKey: pgPassword
      remoteRef:
        key: danni/kratos
        property: postgres_password
