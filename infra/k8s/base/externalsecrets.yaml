# Secrets from OpenBao via the External Secrets Operator (spec 031, FR-144). OpenBao is the shared
# secret backend (one instance, multi-tenant via NAMESPACES — community/OSS, unlike Vault Enterprise);
# danni and looper each get their own OpenBao namespace, and danni's environments are sub-namespaces
# (danni/acceptance, danni/prod — each overlay patches spec.provider.vault.namespace below). ESO's vault
# provider speaks the OpenBao API. Secrets NEVER live in git; rotation = update OpenBao, ESO re-syncs.
#
# OpenBao side (provisioned in the separate openbao repo): a kv-v2 mount `secret`, a Kubernetes auth
# method trusting this cluster, and a role `danni` bound to the `danni-secrets` ServiceAccount with a
# policy allowing read on secret/data/* within the danni/<env> namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: danni-secrets
  namespace: danni
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: danni-secret-store
  namespace: danni
spec:
  provider:
    vault:
      # OpenBao reached over the self-hosted Headscale tailnet via the in-cluster egress proxy Service
      # (components/openbao-egress) — :8200 is never exposed publicly. The proxy DNATs to OpenBao's
      # tailnet IP; OpenBao presents its own (self-signed) cert, so verify against the `openbao` SAN.
      server: https://openbao:8200
      tlsServerName: openbao
      caProvider:
        type: ConfigMap
        name: openbao-ca # kubectl create configmap openbao-ca --from-file=ca.crt=<openbao tls.crt>
        key: ca.crt
      path: secret # kv-v2 mount
      version: v2
      # OpenBao namespace — OVERLAYS PATCH THIS to danni/acceptance | danni/prod (tenant isolation).
      namespace: danni
      auth:
        kubernetes:
          mountPath: kubernetes # the k8s auth method path in OpenBao
          role: danni # OpenBao role bound to the danni-secrets SA + a read policy
          serviceAccountRef:
            name: danni-secrets
---
# App runtime secrets (LLM provider key, API-signing material, …) → secret/data/app.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: danni-app-secrets
  namespace: danni
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: danni-secret-store
    kind: SecretStore
  target:
    name: danni-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: EXPLORER_DEFAULT_API_KEY
      remoteRef:
        key: app
        property: explorer_default_api_key
---
# Kratos secrets (cookie/cipher) + its Postgres DSN/password → secret/data/kratos. The DSN is assembled
# from the password so it's stored once.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: danni-kratos-secrets
  namespace: danni
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: danni-secret-store
    kind: SecretStore
  target:
    name: danni-kratos-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SECRETS_COOKIE: "{{ .cookie }}"
        SECRETS_CIPHER: "{{ .cipher }}"
        POSTGRES_PASSWORD: "{{ .pgPassword }}"
        DSN: "postgres://kratos:{{ .pgPassword }}@danni-kratos-postgres:5432/kratos?sslmode=disable"
  data:
    - secretKey: cookie
      remoteRef:
        key: kratos
        property: cookie_secret
    - secretKey: cipher
      remoteRef:
        key: kratos
        property: cipher_secret
    - secretKey: pgPassword
      remoteRef:
        key: kratos
        property: postgres_password
---
# GHCR pull credential → a kubernetes.io/dockerconfigjson Secret the app pod references via
# imagePullSecrets (the GHCR package is private). Store a GitHub token with `read:packages` + the
# username under secret/data/ghcr in OpenBao. (Or make the package public and drop this + the pod's
# imagePullSecrets.)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: danni
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: danni-secret-store
    kind: SecretStore
  target:
    name: ghcr-pull
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ .username }}","password":"{{ .token }}","auth":"{{ printf "%s:%s" .username .token | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: ghcr
        property: username
    - secretKey: token
      remoteRef:
        key: ghcr
        property: token
