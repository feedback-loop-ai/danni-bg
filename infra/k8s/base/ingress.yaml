# Edge ingress (spec 031, FR-143): TLS terminated here; ONLY the danni app is exposed. Kratos public
# is reached through the app's own /kratos proxy (single-port model), so it never gets an edge route.
# cert-manager issues the certificate; overlays patch the real host + issuer. Default class is traefik
# (k3s bundles it); swap ingressClassName for nginx/etc. as needed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: danni
  namespace: danni
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - danni.example.org # overlays patch the real host
      secretName: danni-tls
  rules:
    - host: danni.example.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: danni-app
                port:
                  number: 80
