# staging overlay (spec 031, FR-146): identical code to prod, only sized smaller (SC-E3).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: danni-staging

resources:
  - ../../base

images:
  - name: ghcr.io/feedback-loop-ai/danni-app
    newTag: staging

replicas:
  - name: danni-app
    count: 1

patches:
  - target:
      kind: Ingress
      name: danni
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: staging.danni.example.org
      - op: replace
        path: /spec/tls/0/hosts/0
        value: staging.danni.example.org
  - target:
      kind: HorizontalPodAutoscaler
      name: danni-app
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
