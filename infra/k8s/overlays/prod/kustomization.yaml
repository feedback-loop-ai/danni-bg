# prod overlay (spec 031): same base as acceptance, sized for production with multiple replicas (SC-E2/E3).
# Pin the image to an immutable digest in CI (the release pipeline patches newTag/newName → digest);
# >1 replica presupposes the app/control-plane state in Postgres + a shared rate-limit store (FR-145).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: danni-prod

resources:
  - ../../base

images:
  - name: ghcr.io/feedback-loop-ai/danni-app
    newTag: stable # CI pins this to an immutable @sha256 digest per release

replicas:
  - name: danni-app
    count: 2

patches:
  - target:
      kind: Ingress
      name: danni
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: danni.example.org
      - op: replace
        path: /spec/tls/0/hosts/0
        value: danni.example.org
  - target:
      kind: HorizontalPodAutoscaler
      name: danni-app
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 6
  - target:
      kind: SecretStore
      name: danni-secret-store
    patch: |-
      - op: replace
        path: /spec/provider/vault/namespace
        value: danni/prod
