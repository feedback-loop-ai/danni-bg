# dev overlay (spec 031, FR-146): same base, smallest footprint. Non-prod is cheap to stand up and
# tear down — keep replicas low and let Terraform scale the node pool toward zero off-hours.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: danni-dev

resources:
  - ../../base

images:
  - name: ghcr.io/feedback-loop-ai/danni-app
    newTag: dev

replicas:
  - name: danni-app
    count: 1

patches:
  - target:
      kind: Ingress
      name: danni
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev.danni.example.org
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev.danni.example.org
  - target:
      kind: HorizontalPodAutoscaler
      name: danni-app
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
# NOTE: the Kratos config host (config/kratos.yaml base_url + return URLs + passkey rp) is substituted
# at render time per environment (envsubst dev.danni.example.org) — see infra/README.md.
