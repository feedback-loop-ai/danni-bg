# Tailscale egress proxy → OpenBao (spec 033). The Tailscale K8s OPERATOR isn't used: it authenticates
# via Tailscale's SaaS OAuth API, which our self-hosted Headscale doesn't implement. Instead a plain
# tailscale container joins OUR Headscale (--login-server + an ephemeral pre-auth key) and DNATs traffic
# to OpenBao's tailnet IP. The `openbao` Service fronts it, so ESO talks to OpenBao in-cluster while
# :8200 stays off the public internet.
#
# Set before use: TS_EXTRA_ARGS (your Headscale URL) + TS_DEST_IP (OpenBao's tailnet IP), and create the
# bootstrap secret `tailscale-auth` (key `authkey` = an ephemeral Headscale pre-auth key) out-of-band —
# it must NOT come from OpenBao (that would be circular).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao-egress
  namespace: danni
  labels:
    app.kubernetes.io/name: openbao-egress
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao-egress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao-egress
    spec:
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: authkey
            - name: TS_EXTRA_ARGS
              value: "--login-server=https://headscale.example.org" # set your Headscale URL
            - name: TS_DEST_IP
              value: "100.64.0.1" # set OpenBao's tailnet IP (headscale-assigned)
            - name: TS_USERSPACE
              value: "false"
            - name: TS_HOSTNAME
              value: "danni-openbao-egress"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: danni
  labels:
    app.kubernetes.io/name: openbao-egress
spec:
  selector:
    app.kubernetes.io/name: openbao-egress
  ports:
    - name: https
      port: 8200
      targetPort: 8200
---
# The base default-deny-ingress blocks the cross-namespace hop, so allow the External Secrets Operator
# (in the external-secrets namespace) to reach the egress proxy on 8200.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openbao-egress
  namespace: danni
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openbao-egress
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: external-secrets
      ports:
        - protocol: TCP
          port: 8200

