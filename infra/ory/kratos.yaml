version: v26.2.0

# Overridden by the DSN env in docker-compose (points at the dedicated kratos-postgres).
dsn: memory

serve:
  public:
    # Single-port (:8790): the Hono server reverse-proxies /kratos/* to Kratos, so Kratos must build
    # all browser-facing URLs (magic links, flow actions, redirects) against the proxied origin.
    # Incoming requests have the /kratos prefix stripped by the proxy before they reach Kratos.
    base_url: http://localhost:8790/kratos/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:5173 # Vite dev (SPA origin)
        - http://localhost:8790 # Hono-served SPA (prod-ish)
      allowed_methods: [POST, GET, PUT, PATCH, DELETE]
      allowed_headers: [Authorization, Cookie, Content-Type]
      exposed_headers: [Content-Type, Set-Cookie]
      allow_credentials: true
  admin:
    base_url: http://localhost:14434/

selfservice:
  default_browser_return_url: http://localhost:8790/
  allowed_return_urls:
    - http://localhost:8790
    - http://localhost:8790/auth/callback
    - http://localhost:8790/admin/settings
    # Kept so the optional Vite-dev origin (:5173) can still be a valid return target.
    - http://localhost:5173
    - http://localhost:5173/auth/callback
    - http://localhost:5173/admin/settings

  methods:
    password:
      enabled: true
      config:
        min_password_length: 10
        haveibeenpwned_enabled: true
        max_breaches: 0
        identifier_similarity_check_enabled: true
    link:
      enabled: true
      config:
        lifespan: 1h
    code:
      enabled: true
      config:
        lifespan: 1h
    passkey:
      enabled: true
      config:
        rp:
          display_name: danni.bg
          # Relying-party ID = the registrable domain (no scheme/port). `origins` lists the full
          # origins where the WebAuthn ceremony runs — the single-port app, plus the optional Vite dev.
          id: localhost
          origins:
            - http://localhost:8790
            - http://localhost:5173

  flows:
    error:
      ui_url: http://localhost:8790/auth/error

    settings:
      ui_url: http://localhost:8790/auth/settings
      privileged_session_max_age: 15m

    recovery:
      enabled: true
      ui_url: http://localhost:8790/auth/recovery
      use: link
      lifespan: 1h
      after:
        default_browser_return_url: http://localhost:8790/auth/login

    verification:
      enabled: true
      ui_url: http://localhost:8790/auth/verification
      use: link
      lifespan: 24h
      after:
        default_browser_return_url: http://localhost:8790/

    logout:
      after:
        default_browser_return_url: http://localhost:8790/auth/login

    login:
      ui_url: http://localhost:8790/auth/login
      lifespan: 10m
      after:
        default_browser_return_url: http://localhost:8790/auth/callback

    registration:
      # Keep the single-screen form (traits + password + passkey together) rather than v26's
      # profile-first multi-screen flow, so the existing one-step registration UI keeps working.
      enable_legacy_one_step: true
      ui_url: http://localhost:8790/auth/register
      lifespan: 10m
      after:
        default_browser_return_url: http://localhost:8790/auth/callback
        password:
          hooks:
            # Open self-service signup: auto-login on registration (session), then
            # prompt to verify email (not required to use the app — chat is gated on
            # auth, not verification). Verification stays available + encouraged.
            - hook: session
            - hook: show_verification_ui

log:
  level: debug
  format: text
  leak_sensitive_values: true # dev only

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    # No credentials: Kratos refuses to send AUTH over an unencrypted connection, and Mailpit
    # accepts unauthenticated mail by default — so plaintext + no-auth is the working dev combo.
    connection_uri: smtp://mailpit:1025/?disable_starttls=true
  template_override_path: /etc/config/kratos/templates

session:
  lifespan: 24h
  cookie:
    same_site: Lax
    persistent: true
    domain: localhost
